name: Docker Integration Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: docker-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel-to-ai-services:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Inject Laravel APP_KEY (if secret exists)
        run: |
          if [ -n "${{ secrets.APP_KEY }}" ]; then
            sed -i "s|^APP_KEY=.*|APP_KEY=${{ secrets.APP_KEY }}|" docker/laravel.env
            echo "APP_KEY injected from secret"
          else
            echo "APP_KEY secret not set — entrypoint will auto-generate"
          fi

      - name: Build and start stack
        run: |
          # Clean up volumes from previous runs
          docker compose down -v 2>/dev/null || true

          docker compose build --parallel
          docker compose up -d

      - name: Show service status (early)
        if: always()
        run: docker compose ps -a

      - name: Wait for Laravel to become healthy
        run: |
          echo "Waiting for ailixir-laravel container to become healthy..."
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ailixir-laravel 2>/dev/null || echo "unknown")
            echo "  [$i/60] status=$STATUS"

            if [ "$STATUS" = "healthy" ]; then
              echo "Laravel container is healthy!"
              exit 0
            fi

            if [ "$STATUS" = "unhealthy" ]; then
              echo "Container reported unhealthy — checking logs..."
              docker compose logs --tail=80 laravel
              # Give it more time — the healthcheck may have fired during migration
              if [ "$i" -lt 40 ]; then
                echo "  Still within tolerance window, continuing to wait..."
                sleep 5
                continue
              fi
              echo "Container still unhealthy after extended wait"
              exit 1
            fi

            sleep 5
          done
          echo "Timed out waiting for Laravel"
          docker compose logs --tail=100 laravel
          exit 1

      - name: Show service status
        if: always()
        run: docker compose ps -a

      - name: Verify Laravel is responding
        run: |
          curl -sf http://localhost:8080/ > /dev/null 2>&1 || {
            echo "Laravel not responding on port 8080"
            docker compose logs --tail=50 laravel
            exit 1
          }
          echo "Laravel is responding"

      - name: Run fresh migrations
        run: |
          docker compose exec -T laravel php artisan migrate:fresh --force --no-interaction

      - name: Test aggregated AI health via Laravel
        run: |
          echo "GET /api/ai-services/health"
          curl -sf http://localhost:8080/api/ai-services/health | tee health.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("health.json"))
          if not data.get("success"):
              print("AI services health check failed:", json.dumps(data, indent=2))
              sys.exit(1)
          print("All AI services healthy via Laravel")
          PY

      - name: Test ADMET proxy via Laravel
        run: |
          echo "POST /api/ai-services/test/admet"
          curl -sf -X POST http://localhost:8080/api/ai-services/test/admet \
            -H "Content-Type: application/json" \
            -d '{"smiles":"c1ccccc1"}' | tee admet.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("admet.json"))
          if not data.get("success"):
              print("ADMET proxy test failed:", json.dumps(data, indent=2))
              sys.exit(1)
          print("ADMET proxy OK")
          PY

      - name: Test Chemical RAG proxy via Laravel
        run: |
          echo "POST /api/ai-services/test/chemical-search"
          curl -sf -X POST http://localhost:8080/api/ai-services/test/chemical-search \
            -H "Content-Type: application/json" \
            -d '{"smiles":"CCO","top_k":3}' | tee chemical.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("chemical.json"))
          if not data.get("success"):
              print("Chemical RAG proxy test failed:", json.dumps(data, indent=2))
              sys.exit(1)
          print("Chemical RAG proxy OK")
          PY

      - name: Test Drug Repurposing proxy via Laravel
        run: |
          echo "GET /api/ai-services/test/drug-repurposing"
          curl -sf http://localhost:8080/api/ai-services/test/drug-repurposing | tee drug.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("drug.json"))
          if not data.get("success"):
              print("Drug Repurposing proxy test failed:", json.dumps(data, indent=2))
              sys.exit(1)
          print("Drug Repurposing proxy OK")
          PY

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
